<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Для тебя ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Pacifico&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    html,body{
      width:100%;height:100%;overflow:hidden;
      background:#150025;
      font-family:'Dancing Script',cursive;
      cursor:none;
    }
    @media(pointer:coarse){html,body{cursor:auto}#cursor{display:none}}

    /* ── BG ── */
    #bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none}

    /* ── CURSOR ── */
    #cursor{position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);font-size:18px;filter:drop-shadow(0 0 6px #ff2d78)}

    /* ── SCREENS ── */
    .screen{
      position:fixed;inset:0;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      z-index:10;
      transition:opacity 0.7s ease,transform 0.7s ease;
    }
    .screen.hidden{opacity:0;pointer-events:none;transform:scale(1.05)}

    /* ── SCREEN 1 ── */
    #screen1{gap:clamp(20px,5vw,40px);padding:24px}

    .subtitle{
      font-size:clamp(14px,4vw,20px);color:#ffb3d9;
      letter-spacing:2px;margin-bottom:8px;
      text-shadow:0 0 12px #ff2d78aa;text-align:center;
    }
    #typeText{
      font-family:'Pacifico',cursive;
      font-size:clamp(28px,8vw,64px);
      background:linear-gradient(135deg,#ffd700,#ff2d78,#a020f0,#ff0099);
      background-size:300% 300%;
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      animation:gradShift 3s ease infinite;
      filter:drop-shadow(0 0 16px rgba(255,45,120,.6));
      min-height:1.3em;text-align:center;
    }
    @keyframes gradShift{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}

    .btn-row{display:flex;gap:clamp(16px,5vw,40px);justify-content:center;align-items:center;width:100%}
    .btn{
      font-family:Arial,sans-serif;font-weight:900;
      font-size:clamp(20px,6vw,32px);
      padding:clamp(16px,4vw,22px) clamp(40px,10vw,72px);
      border:none;border-radius:100px;cursor:pointer;
      min-width:130px;min-height:64px;letter-spacing:2px;
      -webkit-tap-highlight-color:transparent;touch-action:manipulation;
      flex-shrink:0;user-select:none;-webkit-user-select:none;
      position:relative;overflow:hidden;
      transition:transform 0.12s;
    }
    .btn:active{transform:scale(0.93)}
    #btnYes{
      background:linear-gradient(135deg,#ff2d78,#a020f0);color:#fff;
      box-shadow:0 0 28px #ff2d78bb,0 4px 18px #a020f088,inset 0 1px 0 rgba(255,255,255,.3);
    }
    #btnNo{
      background:linear-gradient(135deg,#3a0060,#6a0080);color:#ffb3d9;
      box-shadow:0 0 16px #a020f066,inset 0 1px 0 rgba(255,255,255,.15);
    }
    #btnNo.floating{position:fixed}

    .no-msg{
      font-size:clamp(14px,4vw,20px);color:#ffd700;
      text-shadow:0 0 10px #ffd700aa;min-height:28px;text-align:center;
    }

    /* ── SCREEN 2 ── */
    #screen2{gap:0;padding:20px;justify-content:flex-start;align-items:center;padding-top:clamp(40px,10vh,80px)}

    /* SVG сердце */
    #heartSvg{
      width:clamp(160px,48vw,280px);
      height:clamp(160px,48vw,280px);
      filter:drop-shadow(0 0 24px #ff2d78) drop-shadow(0 0 48px #ff006688);
      flex-shrink:0;
      margin-bottom: 8px;
    }

    /* Canvas для частиц TE AMO */
    #dotCanvas{
      position:fixed;inset:0;z-index:11;pointer-events:none;
      opacity:0;transition:opacity 0.4s;
    }
    #dotCanvas.visible{opacity:1}

    /* ── FLOATING HEARTS ── */
    .fheart{
      position:fixed;pointer-events:none!important;z-index:5;
      font-size:var(--fs,20px);
      animation:floatUp var(--dur,7s) linear var(--delay,0s) infinite;
      left:var(--left,50%);bottom:-40px;opacity:0;
    }
    @keyframes floatUp{
      0%{opacity:0;transform:translateY(0) rotate(0deg) scale(.8)}
      10%{opacity:.8}
      85%{opacity:.5}
      100%{opacity:0;transform:translateY(-110vh) rotate(var(--rot,20deg)) scale(1.1)}
    }

    /* ── CURSOR TRAIL ── */
    .trail{
      position:fixed;pointer-events:none;z-index:9998;font-size:13px;
      animation:trailFade 0.6s ease forwards;transform:translate(-50%,-50%);
    }
    @keyframes trailFade{
      0%{opacity:1;transform:translate(-50%,-50%) scale(1)}
      100%{opacity:0;transform:translate(-50%,-110%) scale(.2)}
    }

    /* ── SPARK ── */
    .spark{
      position:fixed;pointer-events:none;z-index:6;font-size:var(--sf,14px);
      animation:sparkAnim var(--sd,1.2s) ease forwards;
      left:var(--sx,50%);top:var(--sy,50%);
    }
    @keyframes sparkAnim{
      0%{opacity:1;transform:translate(0,0) scale(1)}
      100%{opacity:0;transform:translate(var(--tx,0),var(--ty,-60px)) scale(0)}
    }

    @keyframes orbitSpark{
      from{transform:rotate(var(--start,0deg)) translateX(var(--r,60px)) rotate(calc(-1*var(--start,0deg)))}
      to{transform:rotate(calc(var(--start,0deg)+360deg)) translateX(var(--r,60px)) rotate(calc(-1*(var(--start,0deg)+360deg)))}
    }

    .sparkle-ring{position:relative;display:flex;align-items:center;justify-content:center}
    .sparkle-ring span{position:absolute;font-size:clamp(14px,4vw,24px);animation:orbitSpark linear infinite}
  </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<canvas id="dotCanvas"></canvas>
<div id="cursor">❤️</div>

<!-- TG hint -->
<div id="openHint" style="position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:99999;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:8px 18px;font-family:sans-serif;font-size:13px;color:#fff;white-space:nowrap;display:none">
  Открой в браузере для лучшего опыта ↗
</div>

<!-- SCREEN 1 -->
<div id="screen1" class="screen">
  <div class="sparkle-ring" id="sparkleRing" style="width:1px;height:1px"></div>
  <div>
    <div class="subtitle">Один важный вопрос...</div>
    <div id="typeText"></div>
  </div>
  <div class="btn-row">
    <button class="btn" id="btnYes" onclick="fireYes()">ДА ❤️</button>
    <button class="btn" id="btnNo"  onclick="handleNo()">НЕТ</button>
  </div>
  <div class="no-msg" id="noMsg"></div>
</div>

<!-- SCREEN 2 -->
<div id="screen2" class="screen hidden">
  <svg id="heartSvg" viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="glow">
        <feGaussianBlur stdDeviation="2.5" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <!-- outer glow layer -->
    <path fill="none" stroke="#ff006680" stroke-width="5"
      filter="url(#glow)"
      d="M50 85 C18 65 3 48 3 32 C3 17 14 7 27 7 C35 7 43 12 50 20 C57 12 65 7 73 7 C86 7 97 17 97 32 C97 48 82 65 50 85Z"/>
    <!-- main outline -->
    <path fill="none" stroke="url(#sg)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
      d="M50 85 C18 65 3 48 3 32 C3 17 14 7 27 7 C35 7 43 12 50 20 C57 12 65 7 73 7 C86 7 97 17 97 32 C97 48 82 65 50 85Z"/>
    <defs>
      <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"   stop-color="#ff9de2"/>
        <stop offset="50%"  stop-color="#ff2d78"/>
        <stop offset="100%" stop-color="#c040ff"/>
      </linearGradient>
    </defs>
  </svg>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<script>
// ── TG detect ──
if(/Telegram|TelegramBot/i.test(navigator.userAgent)||window.TelegramWebviewProxy!==undefined)
  document.getElementById('openHint').style.display='block';

// ══════════════════════════════════
// BG CANVAS
// ══════════════════════════════════
const bgC=document.getElementById('bgCanvas'),bgX=bgC.getContext('2d');
let W,H;
function resizeBg(){W=bgC.width=window.innerWidth;H=bgC.height=window.innerHeight}
resizeBg();
window.addEventListener('resize',resizeBg);

const STARS=Array.from({length:80},()=>({
  x:Math.random()*2000,y:Math.random()*2000,
  r:Math.random()*1.6+0.3,a:Math.random(),
  da:(Math.random()*.007+.002)*(Math.random()<.5?1:-1),
  hue:Math.random()*80+300
}));
let hueS=0;
function drawBg(){
  hueS=(hueS+.25)%360;
  const g=bgX.createLinearGradient(0,0,W,H);
  g.addColorStop(0,`hsl(${hueS},90%,10%)`);
  g.addColorStop(.5,`hsl(${(hueS+60)%360},80%,7%)`);
  g.addColorStop(1,`hsl(${(hueS+120)%360},85%,12%)`);
  bgX.fillStyle=g;bgX.fillRect(0,0,W,H);
  for(const s of STARS){
    s.a+=s.da;if(s.a>=1||s.a<=0)s.da*=-1;
    s.x=(s.x+.12)%W;
    bgX.beginPath();bgX.arc(s.x,s.y%H,s.r,0,Math.PI*2);
    bgX.fillStyle=`hsla(${s.hue},100%,80%,${s.a})`;bgX.fill();
  }
  requestAnimationFrame(drawBg);
}
drawBg();

// ══════════════════════════════════
// CURSOR
// ══════════════════════════════════
const cur=document.getElementById('cursor');
document.addEventListener('mousemove',e=>{
  cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';trail(e.clientX,e.clientY);
});
let lastT=0;
function trail(x,y){
  const now=Date.now();if(now-lastT<80)return;lastT=now;
  const el=document.createElement('div');el.className='trail';el.textContent='❤';
  el.style.left=x+'px';el.style.top=y+'px';
  el.style.color=`hsl(${Math.random()*60+310},100%,65%)`;
  document.body.appendChild(el);setTimeout(()=>el.remove(),600);
}
document.addEventListener('touchmove',e=>{
  trail(e.touches[0].clientX,e.touches[0].clientY);
},{passive:true});

// ══════════════════════════════════
// FLOATING HEARTS
// ══════════════════════════════════
const HC=['❤️','💕','💖','💗','💓','💝','🩷'];
function floatHeart(){
  const el=document.createElement('div');el.className='fheart';
  el.style.setProperty('--fs',(Math.random()*16+12)+'px');
  el.style.setProperty('--left',Math.random()*100+'vw');
  el.style.setProperty('--dur',(Math.random()*5+6)+'s');
  el.style.setProperty('--delay',(Math.random()*4)+'s');
  el.style.setProperty('--rot',(Math.random()*40-20)+'deg');
  el.textContent=HC[Math.floor(Math.random()*HC.length)];
  document.body.appendChild(el);
  const d=(parseFloat(el.style.getPropertyValue('--dur'))+parseFloat(el.style.getPropertyValue('--delay')))*1000+500;
  setTimeout(()=>el.remove(),d);
}
for(let i=0;i<12;i++)floatHeart();
setInterval(floatHeart,900);

// ══════════════════════════════════
// SPARKLE RING
// ══════════════════════════════════
const ring=document.getElementById('sparkleRing');
['✨','⭐','💫','🌟','⚡','✨','💖','🌟'].forEach((em,i)=>{
  const s=document.createElement('span');
  s.style.setProperty('--start',(i/8*360)+'deg');
  s.style.setProperty('--r',Math.min(W*.3,130)+'px');
  s.style.animationDuration=(4+i*.5)+'s';
  s.textContent=em;ring.appendChild(s);
});

// ══════════════════════════════════
// TYPEWRITER
// ══════════════════════════════════
function typeWriter(el,txt,spd,cb){
  let i=0;el.textContent='';
  const iv=setInterval(()=>{el.textContent+=txt[i++];if(i>=txt.length){clearInterval(iv);cb&&cb();}},spd);
}
typeWriter(document.getElementById('typeText'),'Ты меня любишь?',90);

// ══════════════════════════════════
// NO BUTTON
// ══════════════════════════════════
const btnNo=document.getElementById('btnNo'),noMsg=document.getElementById('noMsg');
const noMsgs=['Неправильный ответ 🤔','Попробуй ещё раз...','Ты уверена? 🙈','Это явно ошибка 😅','Жми ДА! 💕'];
let noClicks=0,noPlaced=false;
function placeNoBtn(){
  if(!noPlaced){btnNo.classList.add('floating');noPlaced=true;}
  const bw=btnNo.offsetWidth||130,bh=btnNo.offsetHeight||64,m=12;
  btnNo.style.left=(Math.random()*(window.innerWidth-bw-m*2)+m)+'px';
  btnNo.style.top=(Math.random()*(window.innerHeight-bh-m*2)+m)+'px';
  btnNo.style.right='auto';btnNo.style.bottom='auto';
}
btnNo.addEventListener('mouseenter',placeNoBtn);
function handleNo(){
  placeNoBtn();
  if(noClicks<noMsgs.length){
    noMsg.textContent='';void noMsg.offsetWidth;
    noMsg.textContent=noMsgs[noClicks++];
    if(noClicks>=noMsgs.length){
      btnNo.style.transition='opacity .5s';btnNo.style.opacity='0';
      setTimeout(()=>btnNo.style.display='none',500);
    }
  }
}

// ══════════════════════════════════
// SPARK BURST
// ══════════════════════════════════
function spawnSparks(x,y){
  ['✨','💫','💖','💕','⭐','🩷'].forEach((em,i)=>{
    const el=document.createElement('div');el.className='spark';
    const a=(i/6)*Math.PI*2,d=Math.random()*100+50;
    el.style.setProperty('--sf',(Math.random()*10+10)+'px');
    el.style.setProperty('--sd',(Math.random()*.6+.7)+'s');
    el.style.setProperty('--sx',x+'px');el.style.setProperty('--sy',y+'px');
    el.style.setProperty('--tx',(Math.cos(a)*d)+'px');el.style.setProperty('--ty',(Math.sin(a)*d-30)+'px');
    el.textContent=em;document.body.appendChild(el);setTimeout(()=>el.remove(),1400);
  });
}

// ══════════════════════════════════
// CONFETTI
// ══════════════════════════════════
function launchConfetti(){
  const colors=['#ff2d78','#ff0099','#ffd700','#a020f0','#ff80bf'];
  confetti({particleCount:70,angle:60, spread:70,origin:{x:0,y:.6},colors});
  confetti({particleCount:70,angle:120,spread:70,origin:{x:1,y:.6},colors});
}

// ══════════════════════════════════
// DOT PARTICLES — только для TE AMO
// ══════════════════════════════════
const dC=document.getElementById('dotCanvas'),dX=dC.getContext('2d');
let DW,DH;
function resizeDot(){DW=dC.width=window.innerWidth;DH=dC.height=window.innerHeight}
window.addEventListener('resize',resizeDot);

// Шаблоны букв: нормализованные координаты [x,y] в диапазоне 0..1 (ширина x высота)
// x: 0=левый край, 1=правый край; y: 0=верх, 1=низ
const LETTER_TEMPLATES = {
  T: [
    [0,0],[.25,0],[.5,0],[.75,0],[1,0],
    [.5,.2],[.5,.4],[.5,.6],[.5,.8],[.5,1],
    [.35,.5],[.65,.5]
  ],
  E: [
    [0,0],[.3,0],[.6,0],[.95,0],
    [0,.25],[0,.5],[0,.75],[0,1],
    [.3,.5],[.6,.5],
    [.3,1],[.6,1],[.95,1]
  ],
  A: [
    [.5,0],
    [.2,.2],[.8,.2],
    [0,.5],[1,.5],
    [.1,.7],[.9,.7],
    [0,1],[.35,.5],[.65,.5],[1,1],
    [.25,.85],[.75,.85]
  ],
  M: [
    [0,0],[0,.3],[0,.6],[0,1],
    [1,0],[1,.3],[1,.6],[1,1],
    [.25,.25],[.5,.5],[.75,.25],
    [.15,.1],[.85,.1],[.5,.4]
  ],
  O: [
    [.5,0],[.2,.05],[.8,.05],
    [0,.3],[1,.3],
    [0,.6],[1,.6],
    [0,.5],[1,.5],
    [.2,.95],[.8,.95],[.5,1],
    [.1,.15],[.9,.15],[.1,.85],[.9,.85]
  ]
};

const LETTERS=['T','E','A','M','O'];
let dots=[],letterPts=[],dotPhase='idle',dotTimer=0,curLetter=0;
let heartCX,heartCY;

function buildLetterTargets(){
  const lw=Math.min(DW*.075,48);  // ширина одной буквы — меньше чтобы не слипались
  const lh=Math.min(DH*.13,70);   // высота одной буквы
  const textY=DH*.82;             // ниже — сердце занимает верх
  const gap=lw*.55;               // большой зазор между буквами
  const wordGap=lw*1.1;           // ещё больший зазор между словами
  const totalW=lw*5+gap*4+wordGap;
  let sx=DW/2-totalW/2;
  letterPts=LETTERS.map((l,i)=>{
    const tpl=LETTER_TEMPLATES[l];
    const cx=sx;
    sx+=lw+gap+(i===1?wordGap:0);
    return tpl.map(([nx,ny])=>({
      x: cx+nx*lw,
      y: textY-lh/2+ny*lh
    }));
  });
}

function spawnLetter(idx){
  if(!letterPts[idx])return;
  letterPts[idx].forEach((t,i)=>{
    dots.push({
      x:heartCX+(Math.random()-.5)*30,
      y:heartCY+(Math.random()-.5)*30,
      tx:t.x,ty:t.y,
      hue:310+Math.random()*50,
      size:DW<700?7+Math.random()*2:6+Math.random()*2,
      delay:(i*3)|0,
      done:false
    });
  });
}

// Рисует маленькое сердечко (♥)
function drawHeart(x,y,size,hue){
  const w=size,h=size;
  dX.save();
  dX.translate(x-w/2,y-h/2);
  dX.fillStyle=`hsl(${hue},100%,68%)`;
  dX.beginPath();
  dX.moveTo(w/2, h*.25);
  // left arc
  dX.bezierCurveTo(w/2,0,  0,0,  0, h*.375);
  dX.bezierCurveTo(0, h*.625,  w/2, h*.75,  w/2, h);
  // right arc
  dX.bezierCurveTo(w/2, h*.75,  w, h*.625,  w, h*.375);
  dX.bezierCurveTo(w, 0,  w/2,0,  w/2, h*.25);
  dX.closePath();
  dX.fill();
  dX.restore();
}

function animateDots(){
  requestAnimationFrame(animateDots);
  dotTimer++;
  dX.clearRect(0,0,DW,DH);

  // phase logic
  if(dotPhase==='wait'&&dotTimer>40){
    dotPhase='letters';dotTimer=0;curLetter=0;spawnLetter(0);
  } else if(dotPhase==='letters'&&curLetter<LETTERS.length-1&&dotTimer>60){
    curLetter++;spawnLetter(curLetter);dotTimer=0;
  }

  // update + draw — маленькие сердечки
  for(const d of dots){
    if(d.delay>0){d.delay--;continue;}
    if(!d.done){
      d.x+=(d.tx-d.x)*.08;
      d.y+=(d.ty-d.y)*.08;
      if(Math.hypot(d.tx-d.x,d.ty-d.y)<.8){d.x=d.tx;d.y=d.ty;d.done=true;}
    }
    drawHeart(d.x,d.y,d.size,d.hue);
  }
}

function startDotAnimation(){
  resizeDot();
  // Центр сердца — примерно верхняя треть экрана
  heartCX=DW/2;
  heartCY=DH*.30;
  dC.classList.add('visible');
  dots=[];letterPts=[];
  document.fonts.ready.then(()=>{
    buildLetterTargets();
    dotPhase='wait';dotTimer=0;curLetter=0;
    animateDots();
  });
}

// ══════════════════════════════════
// YES BUTTON
// ══════════════════════════════════
const btnYes=document.getElementById('btnYes'),screen1=document.getElementById('screen1'),screen2=document.getElementById('screen2');
function fireYes(){
  if(btnYes.disabled)return;
  btnYes.disabled=true;btnNo.disabled=true;
  spawnSparks(W/2,H/2);
  screen1.classList.add('hidden');
  setTimeout(()=>{
    screen2.classList.remove('hidden');
    launchConfetti();
    startDotAnimation();
  },500);
}
</script>
</body>
</html>
